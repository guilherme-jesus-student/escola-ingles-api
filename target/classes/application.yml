spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/escola_ingles_db}
    username: ${DB_USERNAME:escola_ingles_stefanini}
    password: ${DB_PASSWORD:180318}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always