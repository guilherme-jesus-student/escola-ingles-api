version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: escola_ingles_postgres
    environment:
      POSTGRES_DB: escola_ingles_db
      POSTGRES_USER: escola_user
      POSTGRES_PASSWORD: escola_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U escola_user -d escola_ingles_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: